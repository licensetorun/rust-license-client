name: Publish

# Publishes to crates.io when a vX.Y.Z tag is pushed, or on a manual run.
# Requires repo secret: CARGO_REGISTRY_TOKEN (a crates.io API token). The version
# published is the one in Cargo.toml.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --all

      - name: Publish
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
